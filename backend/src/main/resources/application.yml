spring:
  application:
    name: delivery-workbench

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/deliveryworkbench}
    username: ${DB_USERNAME:dwuser}
    password: ${DB_PASSWORD:dwpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-minimum-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.deliveryworkbench: INFO
    org.springframework.security: WARN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
