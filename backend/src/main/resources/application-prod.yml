spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/deliveryworkbench}
    username: ${DB_USERNAME:dwuser}
    password: ${DB_PASSWORD:dwpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
