version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL database
  # ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: dw-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-deliveryworkbench}
      POSTGRES_USER: ${DB_USERNAME:-dwuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dwpassword}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - dw-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-dwuser} -d ${DB_NAME:-deliveryworkbench}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dw-network

  # ─────────────────────────────────────────────────────────────
  # Spring Boot backend
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dw-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-deliveryworkbench}
      DB_USERNAME: ${DB_USERNAME:-dwuser}
      DB_PASSWORD: ${DB_PASSWORD:-dwpassword}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-minimum-32-chars}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dw-network

  # ─────────────────────────────────────────────────────────────
  # React frontend (development mode via Vite)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dw-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dw-network

volumes:
  dw-pgdata:
    name: dw-pgdata

networks:
  dw-network:
    name: dw-network
    driver: bridge
